<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tide Trace</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <h1>Tide Trace</h1>
    <p>Local-first logging app for browser-only records.</p>
  </header>

  <main>
    <section id="setup-screen" class="card hidden" aria-labelledby="setup-title">
      <h2 id="setup-title">初回セットアップ</h2>
      <p>設定JSONを読み込んでください。</p>
      <p>このアプリでは、入力項目の表示名をブラウザ内の設定データとして保存します。</p>
      <label for="setup-json">JSON貼り付け欄</label>
      <textarea id="setup-json" rows="10" autocomplete="off" spellcheck="false"></textarea>
      <button id="load-pasted-json" type="button">貼り付けたJSONを読み込む</button>
      <label for="setup-file">JSONファイル選択</label>
      <input id="setup-file" type="file" accept="application/json,.json">
      <button id="load-file-json" type="button">JSONファイルを読み込む</button>
      <p id="setup-error" class="error" role="alert"></p>
    </section>

    <div id="app-screen" class="hidden">
      <section class="card" aria-labelledby="input-title">
        <h2 id="input-title">記録</h2>
        <div id="medication-buttons" class="button-list"></div>
        <label for="medication-note">薬メモ（任意）</label>
        <textarea id="medication-note" rows="3"></textarea>

        <hr>
        <div class="field-row">
          <label for="pain-score">痛みスコア</label>
          <select id="pain-score"></select>
        </div>
        <div class="field-row">
          <label for="pain-state">痛みの状態</label>
          <select id="pain-state"></select>
        </div>
        <label for="pain-note">痛みメモ（任意）</label>
        <textarea id="pain-note" rows="3"></textarea>
        <button id="save-pain" type="button">痛みを記録</button>

        <hr>
        <label for="standalone-note">単独メモ</label>
        <textarea id="standalone-note" rows="4"></textarea>
        <button id="save-note" type="button">メモを保存</button>
      </section>

      <section class="card" aria-labelledby="last-med-title">
        <h2 id="last-med-title">最後のMedication記録</h2>
        <div id="last-medication-list"></div>
      </section>

      <section class="card" aria-labelledby="today-title">
        <h2 id="today-title">今日の記録</h2>
        <div id="today-list"></div>
      </section>

      <section class="card" aria-labelledby="week-title">
        <h2 id="week-title">過去7日分</h2>
        <div id="week-list"></div>
      </section>

      <section class="notice card">
        <p>このアプリの記録は、このブラウザ内に保存されます。端末やブラウザの状態によっては消えることがあります。必要に応じてCSVまたはJSONで書き出してください。</p>
        <p>プライベートブラウズでは、記録が保持されない場合があります。通常のブラウザ画面で使用してください。</p>
      </section>

      <section class="card management" aria-labelledby="manage-title">
        <h2 id="manage-title">管理</h2>
        <button id="export-csv" type="button">CSV書き出し</button>
        <button id="export-json" type="button">JSONバックアップ書き出し</button>
        <label for="import-file">JSONインポート</label>
        <input id="import-file" type="file" accept="application/json,.json">
        <button id="import-json" type="button">JSONバックアップを読み込む</button>
        <button id="delete-all" class="danger" type="button">全データ削除</button>
        <p id="app-message" class="message" role="status"></p>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
